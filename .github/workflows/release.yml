name: Release

# Automated releases via release-please. On every push to main it maintains a
# "release PR" (version bump + CHANGELOG) from your Conventional Commits
# (feat:/fix:/…). Merging that PR creates the tag + GitHub Release, and the build
# job below then compiles a generic binary per OS and uploads them as assets.
#
# The build runs in THIS workflow (gated on release_created) on purpose: a tag
# created by GITHUB_TOKEN does not trigger a separate tag-listening workflow.
on:
  push:
    branches: [main]

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    name: Release PR / tag
    runs-on: ubuntu-latest
    outputs:
      release_created: ${{ steps.rp.outputs.release_created }}
      tag_name: ${{ steps.rp.outputs.tag_name }}
    steps:
      - uses: googleapis/release-please-action@v4
        id: rp

  build:
    name: Build ${{ matrix.name }}
    needs: release-please
    if: ${{ needs.release-please.outputs.release_created == 'true' }}
    runs-on: ${{ matrix.os }}
    env:
      CGO_ENABLED: "1"
      TAG: ${{ needs.release-please.outputs.tag_name }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-amd64
            out: discord-progress-agent-linux-amd64
          - os: macos-latest
            name: macos-arm64
            out: discord-progress-agent-macos-arm64
          - os: windows-latest
            name: windows-amd64
            out: discord-progress-agent-windows-amd64.exe
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Fyne build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev

      # Windows runners already ship a gcc on PATH (used for CGO); macOS uses clang.

      - name: Build
        shell: bash
        run: |
          go build -trimpath -buildvcs=false \
            -ldflags "-s -w -X discord-tracker-agent/internal/settings.Version=${TAG}" \
            -o "${{ matrix.out }}" ./cmd/session-agent

      - name: Upload to release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release upload "$TAG" "${{ matrix.out }}" --clobber
