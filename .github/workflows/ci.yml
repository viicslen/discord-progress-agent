name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  # Fast job: gofmt + vet + race tests on the CORE packages only. These have no
  # Fyne/CGO dependency, so nothing heavy is compiled and no apt install is
  # needed — this finishes in seconds. Full-tree compilation (incl. Fyne) is the
  # build matrix's job below.
  lint-test:
    name: Lint & core tests
    runs-on: ubuntu-latest
    env:
      CORE: >-
        ./internal/vault/... ./internal/state/... ./internal/queue/...
        ./internal/session/... ./internal/settings/... ./internal/discord/...
        ./internal/github/...
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l ./cmd ./internal)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"; echo "$unformatted"; exit 1
          fi

      - name: Vet (core)
        env:
          CGO_ENABLED: "0"
        run: go vet $CORE

      - name: Test (race, core)
        env:
          CGO_ENABLED: "1"
        run: go test -race $CORE

  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    env:
      CGO_ENABLED: "1"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Fyne build deps (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libgl1-mesa-dev xorg-dev

      # Windows runners already ship a gcc on PATH (used for CGO); macOS uses clang.

      - name: Build
        run: go build ./...

      # Vet the full tree (incl. ui/cmd, which need Fyne) once, reusing this
      # job's already-compiled build cache.
      - name: Vet (full)
        if: runner.os == 'Linux'
        run: go vet ./...
